# This workflow will deploy SQL Server Database Project to Azure SQL Database
#
# To configure this workflow:
#
# 1. Create an Azure SQL Database in the Azure Portal
# 2. Create a secret in your repository named AZURE_SQL_CONNECTION_STRING with your database connection string
# 3. Update the environment variables below with your database details
#
# For more information on GitHub Actions for Azure: https://github.com/Azure/Actions
# For more information on SQL Database deployment: https://docs.microsoft.com/en-us/azure/azure-sql/database/

name: Deploy Producto Database to Azure SQL

env:
  AZURE_SQL_SERVER: gerschacondb.database.windows.net
  AZURE_SQL_DATABASE: Productos
  DACPAC_PATH: 'Producto/Producto.API/DB/bin/Release/BD.dacpac'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Producto/Producto.API/DB/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy-database:
    runs-on: windows-latest
    environment:
      name: 'Production-Database'

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore "Producto/Producto.API/Producto.API.sln"

      - name: Build Database Project
        shell: cmd
        run: |
          msbuild "Producto/Producto.API/DB/BD.sqlproj" ^
            /p:Configuration=Release ^
            /p:Platform="Any CPU" ^
            /p:OutputPath="%GITHUB_WORKSPACE%\Producto\Producto.API\DB\bin\Release\"

      - name: Verify DACPAC file exists
        shell: powershell
        run: |
          $dacpacPath = Join-Path $env:GITHUB_WORKSPACE "${{ env.DACPAC_PATH }}"
          Write-Host "Looking for DACPAC at: $dacpacPath"
          if (Test-Path $dacpacPath) {
            Write-Host "DACPAC file found!"
            Get-Item $dacpacPath | Format-List
          } else {
            Write-Host "Files in DB output folder:"
            $outFolder = Join-Path $env:GITHUB_WORKSPACE "Producto/Producto.API/DB/bin/Release"
            if (Test-Path $outFolder) {
              Get-ChildItem $outFolder -Recurse | Format-List
            } else {
              Write-Host "Output folder does not exist: $outFolder"
            }
            Write-Error "DACPAC file not found at $dacpacPath"
            exit 1
          }

      - name: Deploy to Azure SQL Database
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          path: '${{ github.workspace }}\${{ env.DACPAC_PATH }}'
          action: 'publish'
          arguments: '/p:DropObjectsNotInSource=false /p:BlockOnPossibleDataLoss=true /p:IgnoreRoleMembership=true'

      - name: Database Deployment Summary
        shell: powershell
        run: |
          Write-Host "Database deployment completed successfully!"
          Write-Host "Target Server: ${{ env.AZURE_SQL_SERVER }}"
          Write-Host "Target Database: ${{ env.AZURE_SQL_DATABASE }}"